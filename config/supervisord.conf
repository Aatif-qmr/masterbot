[supervisord]
logfile=/Users/aatifquamre/masterbot/logs/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/Users/aatifquamre/masterbot/config/supervisord.pid
nodaemon=false

[unix_http_server]
file=/Users/aatifquamre/masterbot/config/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///Users/aatifquamre/masterbot/config/supervisor.sock

[program:freqtrade_mean_reversion]
command=/Users/aatifquamre/masterbot/venv/bin/freqtrade trade --config /Users/aatifquamre/masterbot/config/config_mean_reversion.json --strategy MeanReversionV1 --strategy-path /Users/aatifquamre/masterbot/strategies/active --db-url sqlite:///user_data/mean_reversion.sqlite
directory=/Users/aatifquamre/masterbot
