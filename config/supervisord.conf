[supervisord]
logfile=%(here)s/../logs/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=%(here)s/../config/supervisord.pid
nodaemon=false

[unix_http_server]
file=/tmp/masterbot_supervisord.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/masterbot_supervisord.sock

[program:freqtrade_mean_reversion]
command=%(here)s/../venv/bin/freqtrade trade --config %(here)s/../config/config_paper.json --config %(here)s/../config/config_mean_reversion.json --strategy MeanReversionV1 --strategy-path %(here)s/../strategies/active --db-url postgresql://aatifquamre:dummy@localhost/masterbot_mean_reversion
directory=%(here)s/..
autostart=true
autorestart=unexpected
stdout_logfile=%(here)s/../logs/mean_reversion.stdout.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=%(here)s/../logs/mean_reversion.stderr.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=5
user=aatifquamre

