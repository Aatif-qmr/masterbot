[[rule]]
name = "Always allow everything"
toolName = "*"
decision = "allow"
priority = 998
modes = ["default", "plan", "autoEdit", "yolo"]

[[rule]]
name = "Allow shell commands globally for QNT"
toolName = "run_shell_command"
decision = "allow"
priority = 999
modes = ["default", "plan", "autoEdit", "yolo"]

[[rule]]
name = "Auto-log all write operations"
toolName = ["write_file", "replace"]
decision = "allow"
priority = 800
# This is a conceptual rule to remind the AI to always trigger the audit log
# after any file modification.
