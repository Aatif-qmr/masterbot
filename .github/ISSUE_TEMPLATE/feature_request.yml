name: Feature Request
description: Suggest an idea for this project
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees:
  - aatifquamre
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature!
        
        **Before submitting:**
        - Search existing issues to avoid duplicates
        - Ensure this aligns with the project's goals
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: I'm always frustrated when [...]
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How important is this feature to you?
      options:
        - Low (Nice to have)
        - Medium (Would improve workflow)
        - High (Critical for my use case)
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of the system would this feature affect?
      multiple: true
      options:
        - Sentiment Pipeline
        - Risk Manager
        - Trading Strategies
        - Oracle/Indicators
        - Memory/Notifier
        - Database/Vault
        - API Integrations (Binance, Reddit, etc.)
        - Deployment/Scripts
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or examples about the feature request here.
