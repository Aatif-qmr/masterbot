name: Performance Issue
description: Report a performance problem or optimization opportunity
title: "[Performance]: "
labels: ["performance", "triage"]
assignees:
  - aatifquamre
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a performance issue!
        
        **Before submitting:**
        - Check if the issue is related to hardware limitations
        - Verify it's not already reported
  - type: textarea
    id: description
    attributes:
      label: Performance Issue Description
      description: Describe the performance problem (slow execution, high memory usage, etc.)
    validations:
      required: true
  - type: input
    id: benchmark
    attributes:
      label: Current Performance Metrics
      description: If available, provide timing, memory usage, or other metrics
      placeholder: e.g., "Takes 30s to process 1000 trades"
  - type: input
    id: target
    attributes:
      label: Target Performance
      description: What performance level would you like to achieve?
      placeholder: e.g., "Should complete in under 5s"
  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of the system is affected?
      multiple: true
      options:
        - Sentiment Pipeline
        - Risk Manager
        - Trading Strategies
        - Oracle/Indicators
        - Memory/Notifier
        - Database/Vault
        - API Integrations (Binance, Reddit, etc.)
        - Deployment/Scripts
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we observe this performance issue?
      placeholder: |
        1. Run '...'
        2. Wait for '....'
        3. Observe slow performance
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, hardware specs
      placeholder: e.g., Ubuntu 22.04, Python 3.10, 16GB RAM, 4 CPU cores
    validations:
      required: true
