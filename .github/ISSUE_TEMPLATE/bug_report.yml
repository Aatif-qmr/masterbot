name: Bug Report
description: File a bug report to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - aatifquamre
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        
        **Before submitting:**
        - Search existing issues to avoid duplicates
        - Check if the issue persists on the latest commit
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior
      placeholder: |
        1. Run '...'
        2. Click on '....'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of the system is affected?
      multiple: true
      options:
        - Sentiment Pipeline
        - Risk Manager
        - Trading Strategies
        - Oracle/Indicators
        - Memory/Notifier
        - Database/Vault
        - API Integrations (Binance, Reddit, etc.)
        - Deployment/Scripts
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version/Commit
      description: What version or commit hash are you running?
      placeholder: e.g., abc1234 or v1.0.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and deployment method
      placeholder: e.g., Ubuntu 22.04, Python 3.10, Docker
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code.
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
