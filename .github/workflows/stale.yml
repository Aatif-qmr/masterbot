name: Close Stale Issues and PRs

on:
  schedule:
    - cron: '0 3 * * *'  # Run daily at 3 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Issues configuration
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had 
            recent activity. It will be closed if no further activity occurs. 
            Thank you for your contributions.
          close-issue-message: >
            This issue was closed because it has been inactive for 14 days since being 
            marked as stale. Please reopen if this is still relevant.
          exempt-issue-labels: "bug,enhancement,help wanted,pinned,security"
          
          # PRs configuration
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had 
            recent activity. It will be closed if no further activity occurs. 
            Thank you for your contributions.
          close-pr-message: >
            This PR was closed because it has been inactive for 7 days since being 
            marked as stale. Please reopen if this is still relevant.
          exempt-pr-labels: "pinned,security,WIP"
          
          # General settings
          operations-per-run: 100
          remove-stale-when-updated: true
          debug-only: false
