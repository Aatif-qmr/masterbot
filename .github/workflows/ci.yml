name: Cipher Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust:
    name: Rust — Clippy + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12 (PyO3 link target)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust_engine/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy (deny warnings)
        working-directory: rust_engine
        run: cargo clippy -- -D warnings
        env:
          PYO3_PYTHON: python3.12

      - name: Cargo tests
        working-directory: rust_engine
        run: cargo test --release
        env:
          PYO3_PYTHON: python3.12

  ci:
    name: Run Linting, Formatting, and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install Dependencies
        run: |
          uv sync --frozen

      - name: Run Ruff Format Check
        run: |
          uv run ruff format --check .

      - name: Run Ruff Lint Check
        run: |
          uv run ruff check .

      - name: Run Unit Tests
        run: |
          uv run pytest risk/test_risk_manager.py sentiment/test_pipeline.py tests/test_indicators.py tests/test_event_bus.py -v
